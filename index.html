<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>Warp Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <h1 class="text-2xl font-bold mb-4 text-cyan-400">⚡ バズのゆがみ速報</h1>
    <div id="list" class="space-y-4"></div>
    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            const list = document.getElementById('list');
            data.sort((a,b) => b.warp_score - a.warp_score).forEach(i => {
                const div = document.createElement('div');
                div.className = `p-4 rounded border ${i.warp_score > 70 ? 'border-yellow-500 bg-yellow-900/20' : 'border-gray-800'}`;
                div.innerHTML = `<div class="flex justify-between"><b># ${i.keyword}</b><span>期待度 ${i.warp_score}%</span></div><div class="text-sm text-gray-400">YouTube投稿数目安: ${i.yt_count}件</div>`;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
